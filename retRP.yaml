$engine: 3
$onesync: on
name: retRP
version: 0.0.1
author: dav
description: Custom txAdminRecipe for retRP.

tasks:
  #  Download Base Files
  - action: download_github
    src: https://github.com/RetributionRP/txAdminRecipe
    ref: main
    dest: ./tmp/qbox

  - action: move_path
    src: ./tmp/qbox/server.cfg
    dest: ./server.cfg

  - action: move_path
    src: ./tmp/qbox/permissions.cfg
    dest: ./permissions.cfg

  - action: move_path
    src: ./tmp/qbox/ox.cfg
    dest: ./ox.cfg

  - action: move_path
    src: ./tmp/qbox/voice.cfg
    dest: ./voice.cfg

  - action: move_path
    src: ./tmp/qbox/misc.cfg
    dest: ./misc.cfg

  - action: move_path
    src: ./tmp/qbox/myLogo.png
    dest: ./myLogo.png

  # Prepare Database
  - action: connect_database
  - action: query_database
    file: ./tmp/qbox/qbox.sql

  # STANDALONE
  - action: download_github
    src: https://github.com/RetributionRP/cfx-server-data
    subpath: resources
    dest: ./resources/[cfx-default]
  - action: remove_path
    path: ./resources/[cfx-default]/[gameplay]/chat

  - action: download_github
    dest: ./resources/[standalone]/bob74_ipl
    ref: master
    src: https://github.com/RetributionRP/bob74_ipl

  - action: download_github
    dest: ./resources/[standalone]/safecracker
    ref: main
    src: https://github.com/RetributionRP/safecracker

  - action: download_file
    path: ./tmp/screencapture.zip
    url: https://github.com/itschip/screencapture/releases/latest/download/screencapture.zip
  - action: unzip
    dest: ./resources/[standalone]/
    src: ./tmp/screencapture.zip

  - action: download_github
    dest: ./resources/[standalone]/mhacking
    ref: main
    src: https://github.com/RetributionRP/mhacking

  - action: download_github
    dest: ./resources/[standalone]/scully_emotemenu
    ref: main
    src: https://github.com/RetributionRP/scully_emotemenu

  - action: download_github
    dest: ./resources/[standalone]/ultra-voltlab
    ref: main
    src: https://github.com/RetributionRP/ultra-voltlab

  - action: download_github
    dest: ./resources/[standalone]/illenium-appearance
    ref: main
    src: https://github.com/RetributionRP/illenium-appearance
    
  - action: download_github
    dest: ./resources/[standalone]/MugShotBase64
    ref: main
    src: https://github.com/RetributionRP/MugShotBase64
    subpath: MugShotBase64

  - action: download_file
    url: https://raw.githubusercontent.com/RetributionRP/MugShotBase64/main/README.md
    path: ./resources/[standalone]/MugShotBase64/README.md

  - action: download_file
    url: https://raw.githubusercontent.com/RetributionRP/MugShotBase64/main/LICENSE.md
    path: ./resources/[standalone]/MugShotBase64/LICENSE.md

  - action: download_file
    path: ./tmp/mana_audio.zip
    url: https://github.com/Manason/mana_audio/releases/latest/download/mana_audio.zip
  - action: unzip
    dest: ./resources/[standalone]
    src: ./tmp/mana_audio.zip

    # VOICE
  - action: download_github
    dest: ./resources/[voice]/pma-voice
    ref: main
    src: https://github.com/RetributionRP/pma-voice

  # Downloading Qbox resources
  - action: download_github
    dest: ./resources/[qbx]/qbx_core
    ref: main
    src: https://github.com/RetributionRP/qbx_core
  - action: query_database
    file: ./resources/[qbx]/qbx_core/qbx_core.sql

  - action: download_github
    dest: ./resources/[qbx]/qbx_vehicles
    ref: main
    src: https://github.com/RetributionRP/qbx_vehicles
  - action: query_database
    file: ./resources/[qbx]/qbx_vehicles/vehicles.sql

  - action: download_github
    dest: ./resources/[qbx]/qbx_management
    ref: main
    src: https://github.com/RetributionRP/qbx_management

  - action: waste_time # prevent github throttling
    seconds: 10

  - action: download_github
    dest: ./resources/[standalone]/cd_easytime
    ref: main
    src: https://github.com/RetributionRP/cd_easytime

  - action: download_github
    dest: ./resources/[standalone]/xt-prison
    ref: main
    src: https://github.com/RetributionRP/xt-prison

  - action: download_github
    dest: ./resources/[standalone]/vehiclehandler
    ref: main
    src: https://github.com/RetributionRP/vehiclehandler

  - action: download_github
    dest: ./resources/[qbx]/qbx_smallresources
    ref: main
    src: https://github.com/RetributionRP/qbx_smallresources

  - action: download_github
    dest: ./resources/[qbx]/qbx_density
    ref: main
    src: https://github.com/RetributionRP/qbx_density

  - action: download_github
    dest: ./resources/[qbx]/qbx_adminmenu
    ref: main
    src: https://github.com/RetributionRP/qbx_adminmenu

  - action: download_github
    dest: ./resources/[qbx]/qbx_adminmenu
    ref: main
    src: https://github.com/RetributionRP/qbx_adminmenu

  - action: download_github
    dest: ./resources/[qbx]/qbx_customs
    ref: main
    src: https://github.com/RetributionRP/qbx_customs

  # OX
  - action: download_file
    path: ./tmp/ox_lib.zip
    url: https://github.com/communityox/ox_lib/releases/latest/download/ox_lib.zip
  - action: unzip
    dest: ./resources/[ox]
    src: ./tmp/ox_lib.zip

  - action: download_file
    path: ./tmp/ox_target.zip
    url: https://github.com/communityox/ox_target/releases/latest/download/ox_target.zip
  - action: unzip
    dest: ./resources/[ox]
    src: ./tmp/ox_target.zip

  - action: download_file
    path: ./tmp/oxmysql.zip
    url: https://github.com/communityox/oxmysql/releases/latest/download/oxmysql.zip
  - action: unzip
    dest: ./resources/[ox]
    src: ./tmp/oxmysql.zip

  - action: download_file
    path: ./tmp/ox_doorlock.zip
    url: https://github.com/communityox/ox_doorlock/releases/latest/download/ox_doorlock.zip
  - action: unzip
    dest: ./resources/[ox]
    src: ./tmp/ox_doorlock.zip

  - action: download_file
    path: ./tmp/ox_inventory.zip
    url: https://github.com/communityox/ox_inventory/releases/latest/download/ox_inventory.zip
  - action: unzip
    dest: ./resources/[ox]
    src: ./tmp/ox_inventory.zip

  - action: move_path
    src: ./tmp/qbox/items.lua
    dest: ./resources/[ox]/ox_inventory/data/items.lua
    overwrite: true

  - action: download_github
    dest: ./resources/[ox]/ox_fuel
    ref: main
    src: https://github.com/communityox/ox_fuel
  # Clean up
  - action: remove_path
    path: ./tmp
